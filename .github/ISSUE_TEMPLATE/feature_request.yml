name: Feature request
description: An idea for the game, the Dex, patches, or the Listener.
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas are welcome. Two principles shape what gets in (see the
        [roadmap](https://github.com/catchfleet/catchfleet/blob/main/docs/roadmap.md)):
        **real signal first** (nothing that lets progress happen without real
        reception), and prestige comes from patches and collections, not XP.
  - type: textarea
    id: problem
    attributes:
      label: What's missing or annoying today?
      description: The situation that made you want this, rather than the solution itself.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: How you imagine it working. Rough is fine.
    validations:
      required: true
  - type: textarea
    id: catalog
    attributes:
      label: Catalog or content suggestion? (optional)
      description: >
        Aircraft/type suggestions are welcome but follow the
        [catalog review policy](https://github.com/catchfleet/catchfleet/blob/main/catalog/CATALOG_REVIEW_POLICY.md):
        sourced, decided, documented. Include sources if you have them.
        For a wrong fact on a type page, a plain bug report works too.
